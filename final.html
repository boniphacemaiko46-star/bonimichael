<!DOCTYPE html>  <html>  
<head>  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction App</title>  <style>  
body{  
margin:0;  
font-family:Arial;  
background:#0b1020;  
color:white;  
}  
  
.section{display:none;padding:15px;max-width:500px;margin:auto;}  
.active{display:block;}  
  
.section-title{font-size:22px;font-weight:bold;margin:20px 0 10px;}  
  
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}  
  
.card{  
background:white;  
color:#111;  
padding:15px;  
border-radius:15px;  
font-weight:bold;  
cursor:pointer;  
text-align:center;  
}  
  
.vip .card{background:#ffe8ef;}  
  
h2,h3{text-align:center;}  
  
.match-card{  
background:#2a1f3d;  
padding:15px;  
border-radius:15px;  
margin-bottom:15px;  
}  
  
.league{  
font-size:14px;  
opacity:0.7;  
display:flex;  
justify-content:space-between;  
}  
  
.match{  
display:flex;  
justify-content:space-between;  
margin:10px 0;  
font-weight:bold;  
}  
  
.tip{background:#1e90ff;padding:6px 10px;border-radius:10px;display:inline-block;}  
.odds{background:#7CFC00;color:black;padding:6px 10px;border-radius:10px;float:right;}  
  
.back{margin-bottom:10px;display:inline-block;cursor:pointer;}  
  
#paymentPopup{  
display:none;  
position:fixed;  
top:0;left:0;  
width:100%;height:100%;  
background:rgba(0,0,0,0.7);  
}  
  
.popup-box{  
background:white;  
color:black;  
padding:20px;  
border-radius:15px;  
max-width:300px;  
margin:100px auto;  
text-align:center;  
}  
  
input{  
width:100%;  
padding:10px;  
margin-top:10px;  
border-radius:10px;  
border:1px solid #ccc;  
}  
</style>  </head>  <body>  <!-- HOME -->  <div id="home" class="section active">  <div class="section-title">🔥 Free</div>  
<div class="grid">  
<div class="card" onclick="openPage('daily')">📅 Daily Sure Tips</div>  
<div class="card">🎯 Single Tip</div>  
</div>  <div class="section-title">👑 VIP</div>  
<div class="grid vip">  
<div class="card" onclick="checkVIP()">⭐ Special VIP 🔒</div>  
<div class="card" onclick="checkVIP()">🔀 Fixed VIP 🔒</div>  
</div>  </div>  <!-- DAILY -->  <div id="daily" class="section">  
<div class="back" onclick="openPage('home')">⬅ Back</div>  <h2>🔥 Daily Sure Tips</h2>  
<h3>13.04.2026</h3>  <div id="dailyTips"></div>  
</div>  <!-- VIP -->  <div id="vip" class="section">  
<div class="back" onclick="openPage('home')">⬅ Back</div>  <h2>👑 VIP Tips</h2>  <div class="match-card">🔥 Fixed Match<br>Team A vs Team B<br>Odds: 2.50</div>  
<div class="match-card">🎯 Correct Score<br>2 - 1</div>  </div>  <!-- POPUP -->  <div id="paymentPopup">  
<div class="popup-box">  <h3>🔒 VIP Access</h3>  <p>Lipia kupata VIP:</p>  
<h2 style="color:green;">10,000 TZS</h2>  <p>📱 0743507691</p>  <input type="text" id="vipCode" placeholder="Weka code...">  <button onclick="unlockVIP()" style="padding:10px;width:100%;margin-top:10px;background:#1e90ff;color:white;border:none;border-radius:10px;">  
Unlock VIP  
</button>  <br><br>

<button onclick="closePopup()" style="background:red;color:white;border:none;padding:8px 15px;border-radius:10px;">  
Cancel  
</button>  </div>  
</div>  <script>  
  
function openPage(page){  
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));  
document.getElementById(page).classList.add('active');  
}  
  
// SECRET (still frontend - not fully secure)  
const SECRET_CODE = atob("VklQMTIz"); // VIP123 encoded  
  
function checkVIP(){  
let vip = localStorage.getItem("vipAccess");  
if(vip === "true"){  
openPage('vip');  
}else{  
document.getElementById("paymentPopup").style.display="block";  
}  
}  
  
function closePopup(){  
document.getElementById("paymentPopup").style.display="none";  
}  
  
function unlockVIP(){  
let code = document.getElementById("vipCode").value;  
  
if(code === SECRET_CODE){  
alert("VIP unlocked ✅");  
localStorage.setItem("vipAccess","true");  
closePopup();  
openPage('vip');  
}else{  
alert("Wrong code ❌");  
}  
}  
  
// load tips  
let tips=[  
{  
league:"Netherlands Eerste Divisie",  
time:"21:00",  
home:"Jong Utrecht",  
away:"Vitesse",  
tip:"Over 1.5 Goals",  
odds:"1.30"  
}  
];  
  
let container=document.getElementById("dailyTips");  
  
tips.forEach(g=>{  
let div=document.createElement("div");  
div.className="match-card";  
div.innerHTML=`  
<div class="league"><span>${g.league}</span><span>${g.time}</span></div>  
<div class="match"><span>${g.home}</span><span>vs</span><span>${g.away}</span></div>  
<div class="tip">${g.tip}</div>  
<div class="odds">${g.odds}</div>  
`;  
container.appendChild(div);  
});  
  
</script>  </body>  
</html>
